<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="© GPU-X">
    <meta name="copyright" content="© GPU-X">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; object-src 'none';">
    <title>Neural-X Kernel - © GPU-X</title>
    <style>
        /* CSS3 Architecture - Production Ready */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #00d2ff;
        }
        #neural-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        #nebula-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .kernel-panel {
            background: rgba(5, 5, 20, 0.85);
            border: 1px solid #0055ff;
            border-radius: 8px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0, 85, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .kernel-header {
            border-bottom: 1px solid #0055ff;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .kernel-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00d2ff;
        }
        .kernel-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #0055ff;
            padding: 0.8rem;
            color: #fff;
            font-family: monospace;
            border-radius: 4px;
            margin-bottom: 1rem;
            outline: none;
        }
        .kernel-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        .kernel-btn {
            background: linear-gradient(45deg, #0055ff, #00d2ff);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s ease;
        }
        .kernel-btn:active {
            transform: scale(0.98);
        }
        .kernel-output {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid #00d2ff;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .watermark {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <canvas id="nebula-canvas"></canvas>

    <div id="neural-container">
        <div class="kernel-panel" id="main-panel">
            <div class="kernel-header">
                <div class="kernel-title">Neural-X Kernel</div>
                <div style="font-size: 0.8rem;" id="fps-counter">60 FPS</div>
            </div>
            <input type="text" id="secure-input" class="kernel-input" placeholder="Inserisci payload sensibile per validazione..." autocomplete="off">
            <button id="process-btn" class="kernel-btn">Esegui Elaborazione Nucleo</button>
            <div id="output-log" class="kernel-output">In attesa di istruzioni di boot...</div>
        </div>
    </div>

    <div class="watermark">POWERED BY SYSTEM Core v4.0 — © GPU-X</div>

    <script>
        /**
         * @file Neural-X core system file.
         * @description High-performance, high-security sandboxed web application.
         * @copyright © GPU-X. All rights reserved.
         */

        (function () {
            'use strict';

            // Global Boundary & State Management
            const SystemConfig = Object.freeze({
                copyright: "© GPU-X",
                maxParticles: 500,
                targetFps: 60
            });

            let systemActive = true;
            let workerInstance = null;
            let animationFrameId = null;

            // DOM References
            const canvas = document.getElementById('nebula-canvas');
            const secureInput = document.getElementById('secure-input');
            const processBtn = document.getElementById('process-btn');
            const outputLog = document.getElementById('output-log');
            const fpsCounter = document.getElementById('fps-counter');

            /**
             * Global Error Boundary Interface
             */
            window.addEventListener('error', function (event) {
                event.preventDefault();
                logToKernel(`[CRITICAL ERROR BOUNDARY]: ${event.message}`);
                cleanupHeavyObjects();
            });

            function logToKernel(message) {
                if (!outputLog) return;
                const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
                outputLog.textContent += `\n[${timestamp}] ${message}`;
                outputLog.scrollTop = outputLog.scrollHeight;
            }

            /**
             * Security Module: Input Sanitization Engine
             * Radical Regex sanitization against XSS, injection vectors, and structural breaches.
             */
            function sanitizeInput(inputString) {
                if (typeof inputString !== 'string') return '';
                // Block script, style, iframe, object tags, and suspicious javascript: pseudoprotocols
                let clean = inputString.replace(/<[^>]*>/g, '');
                clean = clean.replace(/javascript:/gi, '');
                clean = clean.replace(/on\w+\s*=/gi, '');
                // Convert structural characters to safe HTML entities
                return clean.replace(/[&<>"'/]/g, function (match) {
                    const entities = {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#x27;',
                        '/': '&#x2F;'
                    };
                    return entities[match];
                });
            }

            /**
             * Security Module: Anti-Tampering & Ghost-Debugger Self-Destruction
             */
            function initiateSelfDestruct(reason) {
                systemActive = false;
                cancelAnimationFrame(animationFrameId);
                if (workerInstance) workerInstance.terminate();
                
                // Pure wipeout of visual and execution contexts
                document.body.innerHTML = `<div style="color: #ff0055; padding: 3rem; font-family: monospace; text-align: center; font-weight: bold; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column;">
                    <h1>[PROTOCOL SECURITY BREACH - SELF DESTRUCT ACTIVATED]</h1>
                    <p style="margin-top: 1rem; color: #555;">Unauthorized code manipulation or environment analysis detected.</p>
                    <p style="margin-top: 0.5rem; font-size: 0.9rem;">Protected under exclusive licensing: © GPU-X</p>
                </div>`;
                
                try {
                    localStorage.clear();
                    sessionStorage.clear();
                } catch (e) {}
                
                throw new Error(`[SECURITY SHUTDOWN]: ${reason}`);
            }

            function verifyEnvironmentIntegrity() {
                // Verification of copyright signatures inside DOM structure
                const metaAuthor = document.querySelector('meta[name="author"]');
                const metaCopyright = document.querySelector('meta[name="copyright"]');
                if (!metaAuthor || metaAuthor.getAttribute('content') !== SystemConfig.copyright ||
                    !metaCopyright || metaCopyright.getAttribute('content') !== SystemConfig.copyright) {
                    initiateSelfDestruct("Missing or altered Intellectual Property Meta signatures.");
                }
            }

            // Mutation Observer tracking structure defense
            const integrityObserver = new MutationObserver((mutations) => {
                for (let mutation of mutations) {
                    if (mutation.type === 'childList' || mutation.type === 'attributes') {
                        // Validate structural components presence
                        if (!document.getElementById('nebula-canvas') || !document.getElementById('main-panel')) {
                            initiateSelfDestruct("Core DOM Node deletion or structural manipulation detected.");
                        }
                    }
                }
            });
            integrityObserver.observe(document.body, { attributes: true, childList: true, subtree: true });

            /**
             * Multithreading Engine: Blob-based Zero-Latency Web Worker
             */
            const workerCodeString = `
                self.onmessage = function(e) {
                    const data = e.data;
                    if (data.type === 'STRESS_TEST') {
                        let result = 0;
                        // Simulation of complex workload (100+ operations loop)
                        for (let i = 0; i < 500000; i++) {
                            result += Math.sin(i) * Math.cos(i);
                        }
                        self.postMessage({ type: 'TEST_COMPLETE', payload: data.payload, metric: result });
                    } else if (data.type === 'ENCRYPT_DATA') {
                        // High-speed array operations placeholder for localized data pipelines
                        self.postMessage({ type: 'ENCRYPTION_ACK', status: 'SUCCESS' });
                    }
                };
            `;

            function initWebWorker() {
                try {
                    const blob = new Blob([workerCodeString], { type: 'application/javascript' });
                    workerInstance = new Worker(URL.createObjectURL(blob));
                    
                    workerInstance.onmessage = function(e) {
                        if (!systemActive) return;
                        if (e.data.type === 'TEST_COMPLETE') {
                            logToKernel(`Worker Operation Completed successfully. Input trace verified: [${e.data.payload}]`);
                        }
                    };

                    workerInstance.onerror = function(err) {
                        logToKernel(`Worker internal error caught: ${err.message}`);
                    };
                } catch (error) {
                    logToKernel(`Worker initialization failure: ${error.message}`);
                }
            }

            /**
             * GPU-Accelerated Graphical Engine: Nebula-Blue 3D
             */
            const GraphicsEngine = (function () {
                let ctx = null;
                let particles = [];
                let width = 0;
                let height = 0;
                let lastFrameTime = performance.now();
                let frameCount = 0;
                let fpsTimer = 0;

                // Static Memory Buffer Structure for Particle properties to prevent dynamic allocations
                function initBuffer() {
                    particles = [];
                    const max = SystemConfig.maxParticles;
                    for (let i = 0; i < max; i++) {
                        particles.push({
                            x: Math.random(),
                            y: Math.random(),
                            z: Math.random() * 2 + 0.5,
                            speedX: (Math.random() - 0.5) * 0.002,
                            speedY: (Math.random() - 0.5) * 0.002,
                            radius: Math.random() * 1.5 + 0.5
                        });
                    }
                }

                function resize() {
                    if (!canvas) return;
                    const dpr = window.devicePixelRatio || 1;
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width * dpr;
                    canvas.height = height * dpr;
                    ctx = canvas.getContext('2d');
                    if (ctx) {
                        ctx.scale(dpr, dpr);
                    }
                }

                function renderLoop(currentTime) {
                    if (!systemActive) return;

                    const deltaTime = currentTime - lastFrameTime;
                    lastFrameTime = currentTime;

                    // Frame-Budget Performance Calculation
                    frameCount++;
                    fpsTimer += deltaTime;
                    if (fpsTimer >= 1000) {
                        if (fpsCounter) {
                            fpsCounter.textContent = `${frameCount} FPS`;
                        }
                        frameCount = 0;
                        fpsTimer = 0;
                    }

                    // Adaptive load balancing: drop computation if frametime spikes excessively
                    const performanceBudgetDrop = deltaTime > 33.3; // Drops below 30fps trigger defensive optimizations

                    if (ctx) {
                        ctx.fillStyle = 'rgba(2, 2, 8, 0.2)'; // Tail effect blending
                        ctx.fillRect(0, 0, width, height);

                        const limit = performanceBudgetDrop ? Math.floor(SystemConfig.maxParticles * 0.5) : SystemConfig.maxParticles;

                        for (let i = 0; i < limit; i++) {
                            const p = particles[i];
                            
                            // Transform static normalized coordinates to actual screen dimensions
                            p.x += p.speedX / p.z;
                            p.y += p.speedY / p.z;

                            // Edge boundaries recycling
                            if (p.x < 0 || p.x > 1) p.x = Math.random();
                            if (p.y < 0 || p.y > 1) p.y = Math.random();

                            const screenX = p.x * width;
                            const screenY = p.y * height;
                            const size = (p.radius / p.z);

                            ctx.beginPath();
                            ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                            // Nebula-Blue exact palette spectrum
                            ctx.fillStyle = `rgba(0, ${Math.floor(150 + (p.z * 40))}, 255, ${1 - (p.z / 2.5)})`;
                            ctx.fill();
                        }
                    }

                    animationFrameId = requestAnimationFrame(renderLoop);
                }

                return {
                    start: function () {
                        if (!canvas) return;
                        window.addEventListener('resize', resize);
                        resize();
                        initBuffer();
                        animationFrameId = requestAnimationFrame(renderLoop);
                    }
                };
            })();

            /**
             * Memory & Resource Allocation Cleanup Routine
             */
            function cleanupHeavyObjects() {
                try {
                    // Prevent memory fragmentation and leaks
                    secureInput.value = '';
                    console.clear();
                } catch (e) {}
            }

            /**
             * System Execution Entry Point
             */
            function bootSystem() {
                verifyEnvironmentIntegrity();
                initWebWorker();
                GraphicsEngine.start();

                if (processBtn && secureInput) {
                    processBtn.addEventListener('click', function () {
                        if (!systemActive) return;

                        const rawValue = secureInput.value;
                        if (!rawValue.trim()) {
                            logToKernel("Attenzione: Input vuoto rilevato.");
                            return;
                        }

                        // Sanitize action sequence
                        const safeValue = sanitizeInput(rawValue);
                        logToKernel(`Input Sanificato Correttamente: ${safeValue}`);

                        // Execution via high-performance Worker thread (Stress-Test implementation)
                        if (workerInstance) {
                            logToKernel("Iniezione task nel Worker Thread per elaborazione asincrona...");
                            workerInstance.postMessage({
                                type: 'STRESS_TEST',
                                payload: safeValue
                            });
                        }

                        cleanupHeavyObjects();
                    });
                }
                logToKernel("Kernel inizializzato correttamente. Stato operativo nominale.");
            }

            // Fire core infrastructure
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bootSystem);
            } else {
                bootSystem();
            }

        })();
    </script>
</body>
</html>
